spring:
  application:
    name: snb-platform
  datasource:
    url: ${SNB_DB_URL:jdbc:postgresql://localhost:5432/snb}
    username: ${SNB_DB_USER:snb_app}
    password: ${SNB_DB_PASSWORD:}
  flyway:
    enabled: ${SNB_FLYWAY_ENABLED:true}
    locations: classpath:db/migration/activity,classpath:db/migration/gallery,classpath:db/migration/content
    schemas: activity,gallery,content
    create-schemas: true
  jpa:
    # schema 由 Flyway 全权管理;validate 只校验实体映射与库结构一致
    hibernate:
      ddl-auto: validate
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

sub2api:
  base-url: ${SUB2API_BASE_URL:http://localhost:8080}
  introspect-cache-seconds: 30
  read-datasource:
    url: ${SUB2API_RO_URL:jdbc:postgresql://localhost:5432/sub2api}
    username: ${SUB2API_RO_USER:snb_ro}
    password: ${SUB2API_RO_PASSWORD:}
  # admin-key 仅经环境变量 SUB2API_ADMIN_KEY 注入;绝不给 yml 默认值——缺省时该属性在
  # Environment 中完全不存在,Sub2apiAdminAutoConfiguration / SubscriptionGrantAdapter 的
  # @ConditionalOnProperty(prefix="sub2api", name="admin-key") 才能真正 fail-closed
  # (yml 给空串默认值会让属性"永远存在但值为空",该注解无 havingValue 时空串≠"false"即判匹配,
  # 会让两个 Bean 恒装配,复审探针已实测坐实此坑,2026-07-14 修复)。

gallery:
  # R2 凭据仅经环境变量注入(GALLERY_R2_ENDPOINT / GALLERY_R2_BUCKET / GALLERY_R2_ACCESS_KEY /
  # GALLERY_R2_SECRET_KEY / GALLERY_R2_PUBLIC_ENDPOINT)。缺 endpoint 时 R2Config 不激活(如测试)。
  ratelimit:
    burst: 60
    per-minute: 120

activity:
  referral:
    start: ${QQ_CAMPAIGN_START:2026-07-09T16:00:00Z}
    end: ${QQ_CAMPAIGN_END:2026-07-16T16:00:00Z}
    newcomer-group-id: ${QQ_CAMPAIGN_GROUP_ID:77}
    cap: 288
    limit: 10
  gate:
    # 金票闸机(spec 2026-07-12-gate-golden-ticket):win-rate ≤0 = 闸机休眠
    threshold-cny: ${GATE_THRESHOLD_CNY:30}
    win-rate: ${GATE_WIN_RATE:0.02}
  checkin:
    launch-date: ${CHECKIN_LAUNCH_DATE:2026-07-13}
    monthly-budget-cap: ${CHECKIN_MONTHLY_BUDGET_CAP:250}
    per-user-monthly-cap: ${CHECKIN_PER_USER_MONTHLY_CAP:10}
    scan-enabled: ${CHECKIN_SCAN_ENABLED:false}
    tier-reward-enabled: ${CHECKIN_TIER_REWARD_ENABLED:false}
    rate-limit:
      capacity: ${CHECKIN_RATE_LIMIT_CAPACITY:30}
      refill-per-sec: ${CHECKIN_RATE_LIMIT_REFILL:5}
    tier:
      a:
        threshold: ${CHECKIN_TIER_A_THRESHOLD:30}
        group-id: ${CHECKIN_TIER_A_GROUP_ID:0}
        cost-cny: ${CHECKIN_TIER_A_COST_CNY:0.9}
      b:
        threshold: ${CHECKIN_TIER_B_THRESHOLD:50}
        group-id: ${CHECKIN_TIER_B_GROUP_ID:0}
        cost-cny: ${CHECKIN_TIER_B_COST_CNY:1.9}
      c:
        threshold: ${CHECKIN_TIER_C_THRESHOLD:500}
        group-id: ${CHECKIN_TIER_C_GROUP_ID:0}
        cost-cny: ${CHECKIN_TIER_C_COST_CNY:4.4}
  achievement:
    retroactive-backfill-enabled: ${CHECKIN_RETROACTIVE_BACKFILL_ENABLED:false}

content:
  # admin 写接口令牌（发布管线经 SSH 隧道调用）；缺省空值=fail-closed 一律 401
  admin-token: ${CONTENT_ADMIN_TOKEN:}
  ratelimit:
    burst: 60
    per-minute: 120
