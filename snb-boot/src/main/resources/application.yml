spring:
  application:
    name: snb-platform
  datasource:
    url: ${SNB_DB_URL:jdbc:postgresql://localhost:5432/snb}
    username: ${SNB_DB_USER:snb_app}
    password: ${SNB_DB_PASSWORD:}
  flyway:
    enabled: ${SNB_FLYWAY_ENABLED:true}
    locations: classpath:db/migration/activity,classpath:db/migration/gallery
    schemas: activity,gallery
    create-schemas: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

sub2api:
  base-url: ${SUB2API_BASE_URL:http://localhost:8080}
  introspect-cache-seconds: 30
  read-datasource:
    url: ${SUB2API_RO_URL:jdbc:postgresql://localhost:5432/sub2api}
    username: ${SUB2API_RO_USER:snb_ro}
    password: ${SUB2API_RO_PASSWORD:}

gallery:
  r2:
    endpoint: ${R2_ENDPOINT:}
    public-endpoint: ${R2_PUBLIC_ENDPOINT:}
    bucket: ${R2_BUCKET:}
    access-key: ${R2_ACCESS_KEY_ID:}
    secret-key: ${R2_SECRET_ACCESS_KEY:}
    presign-ttl-seconds: 600
  ratelimit:
    burst: 60
    per-minute: 120
