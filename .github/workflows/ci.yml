name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
      - name: Bootstrap linqibin-commons from patra
        run: bash scripts/bootstrap-commons.sh
      - name: Build & Test
        run: ./gradlew build --console=plain
