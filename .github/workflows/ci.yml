name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle
      - name: 读 patraRef(commons 缓存键)
        id: patra
        run: echo "ref=$(grep '^patraRef=' gradle.properties | cut -d= -f2)" >> "$GITHUB_OUTPUT"
      # patraRef 钉死,产物不变即复用,免每次 clone+编译 patra(与 release.yml 同 key 跨 workflow 共享)
      - name: 缓存 commons 产物(mavenLocal)
        id: cache-commons
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/dev/linqibin
          key: commons-${{ runner.os }}-${{ steps.patra.outputs.ref }}
      - name: Bootstrap linqibin-commons from patra
        if: steps.cache-commons.outputs.cache-hit != 'true'
        run: bash scripts/bootstrap-commons.sh
      # Build Cache:改哪个模块只重跑哪个的测试,未改模块从 cache 恢复"已通过"(key 用 sha 累积、前缀 restore 最近)
      - name: 缓存 Gradle Build Cache
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches/build-cache-1
          key: gradle-buildcache-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            gradle-buildcache-${{ runner.os }}-
      - name: Build & Test
        run: ./gradlew build --console=plain
