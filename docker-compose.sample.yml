# 部署样例(占位参数,真实值走私有运维仓库 + 服务器 env,绝不入库;本仓库开源)。
# 生产形态:与上游主库同机旁挂,加入既有应用网络,前置反代把 /activity/v1、/gallery/v1 转发进来。
services:
  snb-platform:
    image: ghcr.io/linqibin0826/super-nb-platform:${SNB_PLATFORM_TAG:?}
    container_name: snb-platform
    restart: unless-stopped
    # 小内存宿主必限容器内存;JVM 堆随 MaxRAMPercentage=75 跟进(镜像 ENTRYPOINT 已带)
    mem_limit: 768m
    environment:
      SNB_DB_URL: jdbc:postgresql://sub2api-postgres:5432/snb
      SNB_DB_USER: snb_app
      SNB_DB_PASSWORD: ${SNB_DB_PASSWORD:?}
      # 首启收养既有 schema(迁移先行灌数据的场景);收养完成后可撤
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: 'true'
      SPRING_FLYWAY_BASELINE_VERSION: '2'
      SUB2API_BASE_URL: http://sub2api:8080
      SUB2API_RO_URL: jdbc:postgresql://sub2api-postgres:5432/sub2api
      SUB2API_RO_USER: snb_ro
      SUB2API_RO_PASSWORD: ${SUB2API_RO_PASSWORD:?}
      GALLERY_R2_ENDPOINT: ${GALLERY_R2_ENDPOINT:?}
      GALLERY_R2_PUBLIC_ENDPOINT: ${GALLERY_R2_PUBLIC_ENDPOINT:?}
      GALLERY_R2_BUCKET: ${GALLERY_R2_BUCKET:?}
      GALLERY_R2_ACCESS_KEY: ${GALLERY_R2_ACCESS_KEY:?}
      GALLERY_R2_SECRET_KEY: ${GALLERY_R2_SECRET_KEY:?}
      CONTENT_ADMIN_TOKEN: ${CONTENT_ADMIN_TOKEN:?}
      # 发票手续费结算(admin API 扣/退余额)+签到档位发奖共用;不配则相关能力 fail-closed
      SUB2API_ADMIN_KEY: ${SUB2API_ADMIN_KEY:?}
    # 调试直连口(反代走容器网,不依赖这条)
    ports:
      - "127.0.0.1:8090:8080"
    networks: [app-network]

networks:
  app-network:
    external: true
    # ⚠️ compose 外部网络实名各环境不同,一律参数化
    name: ${APP_NETWORK:?}
